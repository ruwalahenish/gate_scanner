name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Detect which directories changed ──────────────────────────────
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'docker-compose.yml'
              - '.github/workflows/ci.yml'
            frontend:
              - 'apps/web/**'
              - '.github/workflows/ci.yml'

  # ── Backend CI ────────────────────────────────────────────────────
  backend:
    name: Backend — lint, type-check, test
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Security audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit --requirement requirements.txt --ignore-vuln PYSEC-2022-43012 || true

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check app/ --select E,W,F --ignore E501

      - name: Type check (mypy)
        run: |
          pip install mypy types-requests
          mypy app/ --ignore-missing-imports --no-strict-optional || true

      - name: Run tests
        env:
          DATABASE_URL: "postgresql://test:test@localhost/gate_test"
          REDIS_URL: "redis://localhost:6379/0"
        run: pytest tests/ -x -v --tb=short

  # ── Frontend CI ───────────────────────────────────────────────────
  frontend:
    name: Frontend — audit, lint, type-check, build
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level moderate || true

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: "https://henish1999-gate-backend.hf.space"
          NEXT_PUBLIC_WS_URL: "wss://henish1999-gate-backend.hf.space/ws"
        run: npm run build

  # ── Docker build smoke test ───────────────────────────────────────
  docker:
    name: Docker build smoke test
    runs-on: ubuntu-latest
    needs: [backend]
    if: github.ref == 'refs/heads/main' && needs.backend.result == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t gate-api:ci ./backend

  # ── Deploy Backend → HuggingFace Space ────────────────────────────
  # Primary free deployment target — no credit card required.
  # The HF Space runs the same Docker image built by ./backend/Dockerfile.
  # Celery Beat has been removed; cron-job.org triggers /api/internal/tasks/*
  deploy-backend:
    name: Deploy backend → HuggingFace Space
    needs: [backend, docker]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.backend.result == 'success' &&
      needs.docker.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0      # full history needed for git subtree

      - name: Push backend/ to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"

          # Clone the HF Space repo into a temp directory
          git clone https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/gate-backend hf_space

          # Overwrite Space contents with the current backend/ directory
          rsync -av --delete \
            --exclude='.git' \
            --exclude='celerybeat-schedule*' \
            --exclude='tests/' \
            --exclude='*.pyc' \
            --exclude='__pycache__/' \
            --exclude='.gate_cache/' \
            backend/ hf_space/

          cd hf_space
          git add -A
          # Commit only if there are actual changes
          git diff --cached --quiet && echo "No changes to deploy" && exit 0
          git commit -m "Deploy $(git -C .. rev-parse --short HEAD)"
          git push
          echo "Deployed to https://huggingface.co/spaces/$HF_USERNAME/gate-backend"

  # ── Deploy Frontend → Vercel ──────────────────────────────────────
  # Deployment is handled by Vercel's native GitHub integration.
  # Vercel auto-deploys on push to main; the ignoreCommand in vercel.json
  # skips builds when only non-frontend files change.
  # CLI-based deploy is intentionally removed — Hobby plan blocks deployments
  # where the commit author is not the Vercel project owner.
