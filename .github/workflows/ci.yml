name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ─────────────────────────────────────────────────────────
  backend:
    name: Backend — lint, type-check, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Security audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit --requirement requirements.txt --ignore-vuln PYSEC-2022-43012 || true

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check app/ --select E,W,F --ignore E501

      - name: Type check (mypy)
        run: |
          pip install mypy types-requests
          mypy app/ --ignore-missing-imports --no-strict-optional || true

      - name: Run tests
        env:
          DATABASE_URL: "postgresql://test:test@localhost/gate_test"
          REDIS_URL: "redis://localhost:6379/0"
        run: pytest tests/ -x -v --tb=short

  # ── Frontend ─────────────────────────────────────────────────────────
  frontend:
    name: Frontend — audit, lint, type-check, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level moderate || true

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8000"
          NEXT_PUBLIC_WS_URL: "ws://localhost:8000/ws"
        run: npm run build

  # ── Docker smoke test ────────────────────────────────────────────────
  docker:
    name: Docker build smoke test
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t gate-api:ci ./backend

      - name: Build frontend image
        run: docker build -t gate-web:ci ./apps/web
