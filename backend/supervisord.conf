[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
loglevel=info
pidfile=/tmp/supervisord.pid

; ── FastAPI ──────────────────────────────────────────────────────────────
[program:api]
command=uvicorn app.main:app --host 0.0.0.0 --port %(ENV_PORT)s --workers 1 --no-access-log
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=true
startretries=5
priority=10

; ── Celery Worker (all queues, concurrency=1 to fit 512MB free tier) ─────
[program:worker]
command=celery -A app.tasks.celery_app worker --loglevel=info --queues=scans,backtests,admin,default --concurrency=1 --hostname=worker@%%h --max-memory-per-child=200000
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=true
startretries=5
stopwaitsecs=60
priority=20

; ── Celery Beat ──────────────────────────────────────────────────────────
[program:beat]
command=celery -A app.tasks.celery_app beat --loglevel=info --schedule /tmp/celerybeat-schedule
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=true
startretries=3
priority=30
